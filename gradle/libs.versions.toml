room = "2.6.1"
biometric = "1.2.0-alpha05"
apachePoi = "5.3.0"
swiperefreshlayout = "1.1.0"

# Added new versions for the new libraries
oneuiIcons = "1.1.0"
googleAuth = "21.2.0"
